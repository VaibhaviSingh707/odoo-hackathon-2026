<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Asset Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>
<form action="/add_asset" method="POST">
<div class="sidebar">

<div class="logo">

AssetFlow ERP

</div>

<ul>

<li><a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard</a></li>

<li><a href="organization.html"><i class="fa fa-building"></i> Organization Setup</a></li>

<li class="active"><a href="#"><i class="fa fa-box"></i> Assets</a></li>

<li><a href="#"><i class="fa fa-calendar"></i> Bookings</a></li>

<li><a href="#"><i class="fa fa-screwdriver-wrench"></i> Maintenance</a></li>

<li><a href="#"><i class="fa fa-clipboard-check"></i> Audit</a></li>

</ul>

</div>

<div class="main">

<div class="topbar">

<h2>Asset Management</h2>

</div>

<div class="content">

<div class="card-box">

<div class="d-flex justify-content-between mb-3">

<input
id="assetSearch"
class="form-control w-25"
placeholder="Search Asset"
onkeyup="searchAsset()">

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#assetModal"
onclick="clearAssetForm()">

<i class="fa fa-plus"></i>

Register Asset

</button>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Asset ID</th>

<th>Asset Name</th>

<th>Category</th>

<th>Status</th>

<th>Allocated To</th>

<th width="150">Action</th>

</tr>

</thead>

<tbody id="assetTable">

</tbody>

</table>

</div>

</div>

</div>

<div class="modal fade" id="assetModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5>Register Asset</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6">

<label>Asset Name</label>

<input id="assetName" class="form-control">

</div>

<div class="col-md-6">

<label>Category</label>

<select id="assetCategory" class="form-select">

<option>Electronics</option>
<option>Furniture</option>
<option>Vehicles</option>

</select>

</div>

<div class="col-md-6 mt-3">

<label>Asset Status</label>

<select id="assetStatus" class="form-select">

<option>Available</option>
<option>Allocated</option>
<option>Reserved</option>
<option>Under Maintenance</option>
<option>Lost</option>
<option>Retired</option>

</select>

</div>

<div class="col-md-6 mt-3">

<label>Allocated To</label>

<input id="allocatedTo" class="form-control">

</div>

</div>

</div>

<div class="modal-footer">

<button class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
class="btn btn-primary"
onclick="saveAsset()">

Save

</button>

</div>

</div>

</div>

</div>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/assets.js"></script>

</body>
</html>
