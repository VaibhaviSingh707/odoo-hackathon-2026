        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#4facfe,#00c6fb);

        }

        .signup-card{

            width:430px;

            background:white;

            border-radius:18px;

            padding:40px;

            box-shadow:0 15px 35px rgba(0,0,0,.2);

        }

        .logo{

            text-align:center;

            margin-bottom:25px;

        }

        .logo i{

            font-size:60px;

            color:#0d6efd;

            margin-bottom:10px;

        }

        .logo h2{

            color:#0d6efd;

            font-weight:bold;

            margin-bottom:5px;

        }

        .logo p{

            color:#6c757d;

            margin:0;

        }

        .form-label{

            font-weight:600;

        }

        .form-control{

            height:48px;

            border-radius:10px;

        }

        .form-control:focus{

            border-color:#0d6efd;

            box-shadow:0 0 8px rgba(13,110,253,.3);

        }

        .btn-register{

            width:100%;

            height:48px;

            border:none;

            border-radius:10px;

            background:#0d6efd;

            color:white;

            font-size:17px;

            font-weight:bold;

            transition:.3s;

        }

        .btn-register:hover{

            background:#0b5ed7;

        }

        .login-text{

            text-align:center;

            margin-top:20px;

        }

        .login-text a{

            text-decoration:none;

            font-weight:bold;

        }

        .login-text a:hover{

            text-decoration:underline;

        }

    </style>

</head>

<body>
